<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0d7377"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Shield icon -->
  <g transform="translate(80, 130)">
    <path d="M120 0 L240 40 L240 160 Q240 240 120 280 Q0 240 0 160 L0 40 Z"
          fill="none" stroke="#0d7377" stroke-width="6"/>
    <path d="M120 20 L220 55 L220 155 Q220 225 120 260 Q20 225 20 155 L20 55 Z"
          fill="#0d7377" opacity="0.15"/>
    <circle cx="120" cy="130" r="45" fill="#0d7377" opacity="0.3"/>
    <circle cx="120" cy="130" r="30" fill="#0d7377"/>
    <circle cx="120" cy="130" r="12" fill="#0a0a0f"/>
  </g>

  <!-- App name -->
  <text x="400" y="180" font-family="system-ui, -apple-system, sans-serif"
        font-size="72" font-weight="800" fill="#ffffff">StopGuard</text>

  <!-- Tagline -->
  <text x="400" y="230" font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="400" fill="#0d7377">Traffic Stop Rights Monitor</text>

  <!-- Features -->
  <text x="400" y="280" font-family="system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="400" fill="#aaaaaa">Record. Transcribe. Know your rights.</text>
  <text x="400" y="315" font-family="system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="400" fill="#aaaaaa">Real-time analysis for all 50 states.</text>
</svg>
